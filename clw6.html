<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>feedbackform</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
</head>
<body>
    
    <div class="container">
        <h1>feedback form</h1>
    <div class="form-group">
      <label for="name">Name:</label>
      <input type="name" class="form-control" id="name" placeholder=" Enter name" name="name">
    </div>
    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" class="form-control" id="email" placeholder="Enter email" name="email">
    </div>
    <div class="form-group">
        <label for="feedbackmsg">Feedbackmessage:</label>
        <input type="feedbackmsg" class="form-control" id="feedbackmsg" placeholder="Feedbackmsg" name="feedbackmsg">
    </div>
<div class="form-group">
  <label for="sel1">How they found the site:</label>
  <select class="form-control" id="sel1">
    <option>linkedin</option>
    <option>instagram</option>
    <option>youtube</option>
    <option>others</option>
  </select>
</div>

<p>satisfaction level:</p>
<div class="form-check-inline">
  <label class="form-check-label">
    <input type="radio" class="form-check-input "name="optradio">Option 1
  </label>
</div>
<div class="form-check-inline">
  <label class="form-check-label">
    <input type="radio" class="form-check-input"name="optradio" >Option 2
  </label>
</div>
<div class="form-check-inline ">
  <label class="form-check-label">
    <input type="radio" class="form-check-input" name="optradio" >Option 3
  </label>
</div><br>

    
    <button type="submit" class="btn btn-primary">Submit</button>
    





</body>
</html>
