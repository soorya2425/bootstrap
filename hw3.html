<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Progress Dashboard</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body >

<div class="container">
<ul class="breadcrumb">
    
            <li class="breadcrumb-item">Home</li>
            <li class="breadcrumb-item">Courses</li>
            <li class="breadcrumb-item active">Web Development</li>
        </ul>
        <h2>Web Development Course<span class="badge bg-success">New</span></h2><br>
    HTML
        <div class="progress">
            <div class="progress-bar bg-success progress-bar-striped" style="width: 100%;">100%</div>
        </div>

    CSS
        <div class="progress">
            <div class="progress-bar bg-primary progress-bar-striped progress-bar-animated" style="width: 75%;">75%</div>
        </div>

    JAVASCRIPT
        <div class="progress">
            <div class="progress-bar bg-warning" style="width: 50%;">50%</div>
    </div>

    BOOTSTRAP
        <div class="progress">
            <div class="progress-bar bg-danger" style="width: 25%;">25%</div>
        
    </div><br>

    
    <div style="text-align: center;">
            <button type="button" class="btn btn-success">Start</button>
            <button type="button" class="btn btn-warning">Pause</button>
            <button type="button" class="btn btn-danger">Reset</button>
        </div><br>

   
        <ul class="pagination justify-content-center">
            <li class="page-item active "> <a class="page-link" href="#">1</a></li>
            <li class="page-item "><a class="page-link" href="#">2</a> </li>
            <li class="page-item disabled"><a class="page-link" href="#">3</a> </li>
        
           
           
        </ul>
</div>
</body>
</html>
