<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>feedbackform online bakery</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
</head>
<body>
<div class="container">
    <h1> Customer feedback form</h1>
         <div class="form-group">
          <label for="name">Name:</label>
          <input type="name" class="form-control" id="name" placeholder=" Enter name" name="name">
    </div>
          <div class="form-group">
          <label for="email">Email:</label>
           <input type="email" class="form-control" id="email" placeholder="Enter email" name="email">
    </div>
         <div class="form-group">
          <label for="feedbackmsg">Feedbackmessage:</label>
           <input type="feedbackmsg" class="form-control" id="feedbackmsg" placeholder="Feedbackmsg" name="feedbackmsg">
    </div>
        <p>Preffered Contact Method:</p>
         <div class="form-check-inline">
         <label class="form-check-label">
          <input type="radio" class="form-check-input "name="optradio">Email
        </label>
     </div>
         <div class="form-check-inline">
         <label class="form-check-label">
          <input type="radio" class="form-check-input"name="optradio" >phone
        </label>
      </div>

   <div class="form-group">
          <label class="form-label">Satisfaction Level (1-10)</label>
          <input type="range" class="form-range" min="1" max="10">
          </div>

   
    <div class="mb-3">
             <label class="form-label">Order Type</label>
              <select class="form-select">
              <option selected disabled>Select order type</option>
              <option>Cake</option>
              <option>Cookies</option>
              <option>Pastries</option>
              </select>
    </div>
     <button type="submit" class="btn btn-primary">Submit</button>
</body>
</html>
